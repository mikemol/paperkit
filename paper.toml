[paper]
adequacy = true
title = "paperkit"
subtitle = "A paper is a projection of a verified claim-DAG — write claims, not prose."
warrants = ["warrants.bib", "//paper:adequacy_pitch.bib"]
rubric = "rubric.tsv"
out = "README.md"
numbered = false      # README sections read better unnumbered
references = false    # a README has no bibliography section

# Custom check type: claim:<key> runs the per-claim witness in checks/readme.py —
# a distinct, discriminating verifier per README claim (so --without-K and
# --min-strength behavioral hold), just as paper/ does.
[checks.claim]
cmd = "python3 checks/readme.py {target}"

# concept:<key> is a BUILTIN import verb (Λ·witness): it imports a concept authored + GRADED once in
# the //library project (its pitch record composed via //paper:adequacy_pitch.bib), resolving to the
# library's certificate — verdict + engine fingerprint — not a per-view re-authored witness.  No
# [checks.concept] template: the verb is builtin (like result:), owned by the library.
