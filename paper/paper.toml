[paper]
title = "Paperkit: A Paper Is a Projection of a Verified Claim-DAG"
subtitle = "A self-hosting document toolkit — this paper is projected and gated by the tool it describes."
rubric = "rubric.tsv"
warrants = ["warrants.bib", "references.bib"]
out = "paper.md"

# Custom check type: `claim:<key>` runs the per-claim witness in checks/claims.py,
# which asserts the specific proposition that claim makes about the engine — a
# distinct, discriminating verifier per claim (so Δ grades it behavioral and the
# gate's --without-K is satisfied for these claims).  Declaring it here — not in the
# engine — is itself the witness for the resolver section's [@new-domain-adds].
[checks.claim]
cmd = "python3 checks/claims.py {target}"
