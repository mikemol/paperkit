[paper]
title = "Paperkit: A Paper Is a Projection of a Verified Claim-DAG"
subtitle = "A self-hosting document toolkit — this paper is projected and gated by the tool it describes."
rubric = "rubric.tsv"
warrants = ["warrants.bib", "references.bib"]
out = "paper.md"

# No custom check types are needed: every claim below resolves through the two
# built-in verifiers, file: and cmd:.  A domain that needs more (agda:, pytest:,
# …) would declare them here, e.g.:
#   [checks.agda]
#   cmd = "agda --safe {target}"
