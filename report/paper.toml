[paper]
title = "Paperkit — Verification Report"
subtitle = "Generated by running the pipeline on this repository — every figure below is live tool output, gated fresh-by-construction."
warrants = ["warrants.bib"]
rubric = "rubric.tsv"
out = "REPORT.md"
numbered = false
references = false

# `fresh:<asset>` is satisfied by report/gen.py --check <asset>: it regenerates the
# asset from the live pipeline and fails if the committed copy has drifted.
[checks.fresh]
cmd = "python3 gen.py --check {target}"
