[paper]
title = "Graceful Under Pressure"
subtitle = "A self-verifying note on one machine's swap stack: every claim below is a PROBE of the live hardware (setup/probe.py), so re-gating on a different box fails the claims that no longer hold — the prose cannot drift from the machine it describes."
warrants = ["warrants.bib"]
rubric = "rubric.tsv"
out = "SETUP.md"
numbered = false
references = false

# `probe:<fact>` is satisfied by setup/probe.py <fact>: it reads /proc and /sys
# and exits 0 iff the structural fact holds on THIS machine.  The topology claims
# are gated; the measured magnitudes (3.6x, ~0% IO pressure) live in the prose as
# a dated observation resting on the topology that makes them possible.
[checks.probe]
cmd = "python3 probe.py {target}"
