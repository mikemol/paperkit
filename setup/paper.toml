[paper]
title = "Graceful Under Pressure"
subtitle = "A self-verifying note on one machine's swap stack. The claims read a SHIPPED reference dataset (setup/reference.json), interned from /proc and /sys by setup/probe.py's pump() and interpreted by pure functions of that state — so anyone can re-verify them anywhere (machine-readable, no regex, no model in the loop). A separate freshness check certifies provenance: the dataset's structural readings still match THIS box. Body travels; provenance stays home."
warrants = ["warrants.bib"]
rubric = "rubric.tsv"
out = "SETUP.md"
numbered = false
references = false

# `ref:<fact>` interprets the shipped snapshot — setup/probe.py <fact> --from
# reference.json.  Because the check reads a real file in the project, Δ can
# corrupt it and flip the verdict: the claims are NON-VACUOUS (behavioral),
# unlike a live `probe:` read of the kernel, which no file mutation can falsify.
[checks.ref]
cmd = "python3 probe.py {target} --from reference.json"

# `fresh:<dataset>` re-pumps the live machine and checks the snapshot's
# STRUCTURAL readings still match — the provenance anchor that ties the portable
# dataset to this specific box.
[checks.fresh]
cmd = "python3 probe.py --fresh {target}"

# `load:<fact>` interprets loadtest.json — the result of a memory-oversubscription
# experiment that experiment.py runs BOUNDED BY CONSTRUCTION (inside a systemd
# cgroup scope with MemoryMax).  The first load: check produces the dataset (runs
# the experiment); the rest reuse it.  So the witness facts DEPEND on the heavy
# load having run — the dependency is the build order.
[checks.load]
cmd = "python3 experiment.py {target}"
